<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' data: file: https:; style-src 'self' 'unsafe-inline';" />
  <title>DesktopHotkeys</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="backdrop" class="overlay-backdrop"></div>

  <div class="overlay">
    <div class="overlay__panel" id="panel" tabindex="0">
      <div class="titlebar" id="titlebar">
        <span class="titlebar__grip">⠿</span>
        <span class="titlebar__name">DesktopHotkeys — edição</span>
        <button class="titlebar__done" id="tb-done">✓ Concluir</button>
        <button class="titlebar__close" id="titlebar-close" title="Fechar">✕</button>
      </div>
      <div class="overlay__header">
        <div class="eyebrow-row">
          <span class="overlay__eyebrow">INICIADOR</span>
          <span class="editbadge" id="editbadge">MODO EDIÇÃO</span>
        </div>
        <div class="breadcrumb" id="breadcrumb"></div>
      </div>

      <div class="overlay__divider"></div>

      <div class="tile-grid" id="grid"></div>
      <div class="editor" id="editor"></div>

      <div class="footer">
        <span class="pageind" id="pageind"></span>
        <span class="footer__right">
          <button class="editbtn" id="btn-newproj" style="display:none">➕ Novo projeto</button>
          <button class="editbtn" id="btn-tmpl" style="display:none">🧩 Modelo</button>
          <span class="hint" id="hint"></span>
          <button class="editbtn" id="editbtn">✏️ Editar</button>
        </span>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
